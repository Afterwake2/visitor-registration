version: "3.9"
services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:17}
    # If you have PG 18 locally, set POSTGRES_IMAGE=postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visitor_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    environment:
      # Example local DSN (adjust host if using Docker Desktop/WSL)
      DATABASE_URL: postgresql://postgres:postgres@db:5432/visitor_db?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:

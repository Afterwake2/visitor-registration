<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Visitor Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; padding: 24px; max-width: 640px; margin: auto; }
    h2 { margin-top: 0; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input, textarea { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 16px; font-weight: 600; cursor: pointer; }
    .msg { margin-top: 12px; }
    .success { color: #0a7; }
    .error { color: #b00; }
  </style>
</head>
<body>
  <h2>Visitor Registration</h2>

  <form id="visitForm">
    <label>First Name* <input name="firstName" required /></label>
    <label>Last Name* <input name="lastName" required /></label>
    <label>Contact Number* <input name="contactNumber" required /></label>
    <label>Company Name <input name="companyName" /></label>
    <label>Purpose of Visit* <textarea name="purpose" rows="3" required></textarea></label>
    <label>Contact Person* <input name="contactPerson" required /></label>
    <button type="submit">Submit</button>
  </form>

  <div id="msg" class="msg"></div>

  <script>
    const form = document.getElementById("visitForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      msg.className = "msg";

      const data = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        if (json.success) {
          msg.textContent = "Registration successful.";
          msg.classList.add("success");
          form.reset();
        } else {
          msg.textContent = json.error || "Failed to submit.";
          msg.classList.add("error");
        }
      } catch {
        msg.textContent = "Network error. Please try again.";
        msg.classList.add("error");
      }
    });
  </script>
</body>
</html>
